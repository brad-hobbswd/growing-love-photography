<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paige & Junior Maternity Shoot</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #fff;
    color: #333;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

header h1 {
    color: #d88c9a;
}

/* GALLERY GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.gallery img:hover {
    transform: scale(1.03);
}

/* LIGHTBOX */
#lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

#lightbox:active {
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>Paige & Junior Maternity Shoot</h1>
    <p>Growing Love Photography</p>
</header>

<section class="gallery">

    <!-- REPLACE THESE WITH YOUR REAL IMAGES -->
    <img src="photo1.jpg" onclick="openLightbox(this.src)">
    <img src="photo2.jpg" onclick="openLightbox(this.src)">
    <img src="photo3.jpg" onclick="openLightbox(this.src)">
    <img src="photo4.jpg" onclick="openLightbox(this.src)">
    <img src="photo5.jpg" onclick="openLightbox(this.src)">
    <img src="photo6.jpg" onclick="openLightbox(this.src)">

</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
    document.getElementById('lightbox').style.display = 'flex';
    document.getElementById('lightbox-img').src = src;
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
