<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paige & Junior Maternity Shoot</title>

<meta name="author" content="Brad Hobbs Web Design">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    color: #333;
    user-select: none;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 15px;
}

header h1 {
    color: #d88c9a;
}

/* BACK LINK */
.back-home {
    text-align: center;
    margin-bottom: 10px;
}

.back-home a {
    text-decoration: none;
    color: #d88c9a;
    font-size: 14px;
}

/* BUTTONS */
.view-toggle {
    text-align: center;
    margin-bottom: 15px;
}

.view-toggle button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #d88c9a;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 20px;
}

/* IMAGES */
.gallery img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    display: block;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.gallery img:hover {
    transform: scale(1.03);
}

/* Tablet */
@media (max-width: 900px) {
    .gallery {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobile */
@media (max-width: 500px) {
    .gallery {
        grid-template-columns: 1fr;
    }
}

    
/* SLIDESHOW */
#slideshow {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#slideshow img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

/* NAV */
.nav-btn {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 25px;
    color: white;
    cursor: pointer;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 25px;
    background: #fafafa;
    margin-top: 40px;
}

    header {
    text-align: center;
    padding: 15px 15px 10px;
}

    img {
    user-drag: none;
    -webkit-user-drag: none;
    user-select: none;
}
</style>
</head>

<body>

<div class="back-home">
    <a href="index.html">← Back to Home</a>
</div>

<header>
    <img src="banner-paigejuniorphotos.png" alt="Paige & Junior Maternity Photos" style="max-width:1000px; width:100%; border-radius:10px;">
</header>

<div class="view-toggle">
    <button onclick="showGrid()">Grid View</button>
    <button onclick="startSlideshow(0)">Slideshow</button>
</div>

<!-- GRID -->
<section class="gallery">

<img src="IMG_0208.jpeg" onclick="startSlideshow(0)">
<img src="IMG_0209.jpeg" onclick="startSlideshow(1)">
<img src="IMG_0210.jpeg" onclick="startSlideshow(2)">
<img src="IMG_0211.jpeg" onclick="startSlideshow(3)">
<img src="IMG_0212.jpeg" onclick="startSlideshow(4)">
<img src="IMG_0213.jpeg" onclick="startSlideshow(5)">
<img src="IMG_0214.jpeg" onclick="startSlideshow(6)">
<img src="IMG_0215.jpeg" onclick="startSlideshow(7)">
<img src="IMG_0216.jpeg" onclick="startSlideshow(8)">
<img src="IMG_0217.jpeg" onclick="startSlideshow(9)">
<img src="IMG_0218.jpeg" onclick="startSlideshow(10)">
<img src="IMG_0219.jpeg" onclick="startSlideshow(11)">
<img src="IMG_0220.jpeg" onclick="startSlideshow(12)">
<img src="IMG_0221.jpeg" onclick="startSlideshow(13)">
<img src="IMG_0222.jpeg" onclick="startSlideshow(14)">
<img src="IMG_0223.jpeg" onclick="startSlideshow(15)">
<img src="IMG_0224.jpeg" onclick="startSlideshow(16)">
<img src="IMG_0225.jpeg" onclick="startSlideshow(17)">

</section>

<!-- SLIDESHOW -->
<div id="slideshow">
    <span class="close" onclick="closeSlideshow()">✕</span>
    <span class="nav-btn prev" onclick="changeSlide(-1)">❮</span>
    <img id="slide-img">
    <span class="nav-btn next" onclick="changeSlide(1)">❯</span>
</div>

<!-- FOOTER -->
<footer>
    <p>© <span id="year"></span> Growing Love Photography</p>

    <p style="margin-top:5px; font-size:13px; color:#aaa;">
        Website designed by 
        <a href="https://brad-hobbswd.github.io/brad-hobbswd/" target="_blank" style="color:#d88c9a; text-decoration:none;">
            Brad Hobbs Web Design
        </a>
    </p>

    <p style="margin-top:10px; font-size:14px;">
        <a href="https://m.facebook.com/profile.php?id=61571003291121" target="_blank" style="color:#d88c9a; text-decoration:none;">
            Follow along on Facebook 🤍
        </a>
    </p>
</footer>

<script>
let images = [
"IMG_0208.jpeg","IMG_0209.jpeg","IMG_0210.jpeg","IMG_0211.jpeg","IMG_0212.jpeg","IMG_0213.jpeg",
"IMG_0214.jpeg","IMG_0215.jpeg","IMG_0216.jpeg","IMG_0217.jpeg","IMG_0218.jpeg","IMG_0219.jpeg",
"IMG_0220.jpeg","IMG_0221.jpeg","IMG_0222.jpeg","IMG_0223.jpeg","IMG_0224.jpeg","IMG_0225.jpeg"
];

let currentIndex = 0;

function startSlideshow(index) {
    currentIndex = index;
    document.getElementById("slideshow").style.display = "flex";
    showSlide();
}

function showSlide() {
    document.getElementById("slide-img").src = images[currentIndex];
}

function changeSlide(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    showSlide();
}

function closeSlideshow() {
    document.getElementById("slideshow").style.display = "none";
}

function showGrid() {
    closeSlideshow();
}

    document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});
</script>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
